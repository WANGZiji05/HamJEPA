# ============================================================================
# HamJEPA MV-HJEPA Training Config — Physion++
# ============================================================================
#
# Trains HamJEPA on random frames from Physion++ data_v1/ videos.
# Same model architecture as imagenet_hjepa_mv.yaml but uses Physion++
# frames for self-supervised pretraining.
#
# Usage:
#   python scripts/train_physion_hamjepa.py --config configs/physion_hjepa_mv.yaml
#
# After training, use the checkpoint for probe/rollout evaluation:
#   python -m eval.physion_linear_probe.eval --config configs/physion_linear_probe.yaml
#   python -m eval.physion_rollout.eval --config configs/physion_rollout.yaml
# ============================================================================

seed: 42

data:
  # Physion++ data root (contains data_v1/, readout_data_v1/, testdata_v1/)
  root: /research/d7/spc/yrwang5/V-JEPA/data/

  batch_size: 64
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: true
  num_global_views: 2
  num_local_views: 0
  out_size: 224
  global_scale: [0.4, 1.0]
  local_scale: [0.05, 0.4]

model:
  encoder_mode: tokens
  token_layer: layer3
  token_d_f: 32
  token_hw: 8
  encoder_stem: imagenet
  embed_dim: 2048
  proj_hidden: 2048
  proj_out: 2048
  projector_type: identity
  split_qp: true

hjepa:
  method: leapfrog
  steps: 2
  dt: 0.05
  learn_dt: false
  hamiltonian: separable
  hidden_dim: 256
  depth: 2
  residual_scale: 0.02
  residual_scale_warmup_epochs: 10
  base_coeff: 0.1
  integrate_fp32: true

loss:
  match: qp
  detach_target: true
  energy_weight: 0.0
  bidirectional: true
  p_weight: 0.0

regularizer:
  q_std_floor: 0.2
  q_per_dim_target: 1.0
  p_per_dim_target: 1.0
  ddp_sync: true
  q_logdet_proj_dim: 128
  q_logdet_floor: -1.2
  q_logdet_eps: 1.0e-4
  q_logdet_refresh_interval: 16
  q_pr_norm_floor: 0.25
  q_eigmax_frac_ceiling: 0.10
  p_logdet_proj_dim: 128
  p_logdet_floor: -1.2
  p_logdet_eps: 1.0e-4
  p_logdet_refresh_interval: 16
  p_pr_norm_floor: 0.25
  p_eigmax_frac_ceiling: 0.10

train:
  epochs: 30
  lr: 0.0005
  h_lr: 0.00005
  weight_decay: 0.0005
  warmup_epochs: 5
  min_lr_ratio: 0.001
  precision: fp32
  ckpt_dir: checkpoints
  checkpoint_every: 5

  lambda_budget: 0.2
  lambda_var: 1.0
  lambda_logdet: 1.0
  lambda_mean: 0.05
  grad_clip: 1.0
  log_every: 100
  profile_timing: false
  profile_every: 200
